<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 96" role="img" aria-label="MedAlert+ Logo">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C67E8"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="50%" stop-color="#C7D2FE"/>
      <stop offset="50%" stop-color="white"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M46 2 C20 2 4 10 4 22 L4 52 C4 76 46 93 46 93 C46 93 88 76 88 52 L88 22 C88 10 72 2 46 2 Z"/>
    </clipPath>
  </defs>

  <!-- Shield body -->
  <path d="M46 2 C20 2 4 10 4 22 L4 52 C4 76 46 93 46 93 C46 93 88 76 88 52 L88 22 C88 10 72 2 46 2 Z" fill="url(#sg)"/>

  <!-- Cross: vertical bar -->
  <rect x="41" y="17" width="11" height="46" rx="3.5" fill="white"/>
  <!-- Cross: horizontal bar -->
  <rect x="24" y="34" width="45" height="11" rx="3.5" fill="white"/>

  <!-- Pill capsule (clipped inside shield) -->
  <g clip-path="url(#shieldClip)">
    <g transform="translate(32,65) rotate(-44)">
      <rect x="-17" y="-7" width="34" height="14" rx="7" fill="url(#pg)" opacity="0.95"/>
    </g>
  </g>

  <!-- "MedAlert+" text -->
  <text
    x="103"
    y="68"
    font-family="'Inter','Segoe UI',Arial,sans-serif"
    font-weight="900"
    font-size="50"
    fill="#3730A3"
    letter-spacing="-0.5"
  >MedAlert<tspan fill="#5C67E8">+</tspan></text>
</svg>
